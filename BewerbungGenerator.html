<style>

label{display:block;margin-top:12px;font-weight:bold;}

.section{background:white;padding:20px;margin-bottom:15px;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,0.1);}
#mainContent{display:none;}
#welcome{text-align:center;}

<h2>DJLMnet</h2>

<div id="welcome" class="section">
<p>Willkommen! Wähle:</p>
<button onclick="chooseOption('lebenslauf')">Lebenslauf erstellen</button>

    <option value="9">September</option>

      <label style="font-weight:bold; display:block; margin-bottom:10px;">Geburtsort:</label>

<script>
  window.currentMode = "lebenslauf";
  // ===== UI логика =====
  function chooseOption(option){
    document.getElementById('welcome').style.display='none';
    document.getElementById('mainContent').style.display='block';

    if(option==='lebenslauf'){
      document.getElementById('formTitle').innerText="Lebenslauf erstellen";
      document.getElementById('bewerbungFields').style.display='none';
      document.getElementById('lebenslaufFields').style.display='block';
      window.currentMode="lebenslauf";
    }else{
      document.getElementById('formTitle').innerText="Bewerbung erstellen";
      document.getElementById('bewerbungFields').style.display='block';
      document.getElementById('lebenslaufFields').style.display='none';
      window.currentMode="bewerbung";
    }
  }

  // ===== дата =====
  window.onload=function(){
    const today=new Date();
    const day=String(today.getDate()).padStart(2,'0');
    const month=String(today.getMonth()+1).padStart(2,'0');
    const year=today.getFullYear();
    const dateEl = document.getElementById('date');
    if(dateEl) dateEl.value=`${day}.${month}.${year}`;
  }
 // ===== Слушатели кнопок =====

function generatePDF(){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF();

  if(window.currentMode==="lebenslauf"){

    doc.setFontSize(20);
    doc.setFont("helvetica","bold");
    doc.text("Lebenslauf",105,20,null,null,"center");

    // колонки
    let leftX=20, rightX=110;
    let leftY=40, rightY=40;

    // Собираем дату рождения из трёх полей
    const cvBirth = `${cvBirthDay.value}.${cvBirthMonth.value}.${cvBirthYear.value}`;

    // левая колонка
    const left=[
      `Name: ${cvName.value}`,
      `Geburtsdatum: ${cvBirth}`,
      `Geburtsort: ${cvBirthPlace.value}`,
      `Adresse: ${cvAddress.value}`,
      `Telefon: ${cvPhone.value}`,
      `Email: ${cvEmail.value}`
    ];

    doc.setFont("helvetica","normal");
    left.forEach(t=>{
      let lines=doc.splitTextToSize(t,80);
      doc.text(lines,leftX,leftY);
      leftY+=lines.length*7;
    });

    // правая колонка
    const right=[
      ["Schule",cvSchool.value],
      ["Erfahrungen",cvExperience.value],
      ["Fähigkeiten",cvSkills.value],
      ["Sprachen",cvLanguages.value],
      ["Stärken",cvStrengths.value],
      ["Hobbys",cvHobbies.value]
    ];

    right.forEach(([title,val])=>{
      doc.setFont("helvetica","bold");
      doc.text(title+":",rightX,rightY);
      rightY+=6;

      doc.setFont("helvetica","normal");
      let lines=doc.splitTextToSize(val,80);
      doc.text(lines,rightX,rightY);
      rightY+=lines.length*7+5;
    });

    doc.save("Lebenslauf_Pro.pdf");
    return;
  }

  // ===== Bewerbung =====
  let y=20;

  const company=companyName.value+"\n"+companyStreet.value+"\n"+companyEmail.value;
  doc.setFont("helvetica","bold");
  doc.text(company,20,y); y+=30;

  doc.setFont("helvetica","normal");
  const personal=personalName.value+"\n"+personalAddress.value+"\n"+personalPhone.value+"\n"+personalEmail.value;
  doc.text(personal,20,y); y+=30;

  doc.text(place.value+", "+date.value,20,y); y+=10;

  doc.setFont("helvetica","bold");
  doc.text("Bewerbung "+jobTitle.value,20,y); y+=10;

  const b=generateRandomBewerbung(jobTitle.value,personalName.value,practiceType.value);

  doc.text(b.title,20,y); y+=10;

  doc.setFont("helvetica","normal");
  doc.text(doc.splitTextToSize(b.body,170),20,y);

  doc.save("Bewerbung.pdf");
}

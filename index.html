<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>BewerbungGenerator</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <link href="css/styles.css" rel="stylesheet">
</head>

<body>

<header class="site-header">
    <span class="site-title">DJLMnet</span>
</header>

<main id="mainContent">

    <!--- Welcome screen --->
    <div id="welcome">

        <!-- Section 1: Lebenslauf -->
        <section aria-labelledby="heroLebenslaufTitle" class="hero hero--light">
            <div class="hero__content">
                <p class="hero__eyebrow">Dokument erstellen</p>
                <h1 class="hero__title" id="heroLebenslaufTitle">Lebenslauf</h1>
                <p class="hero__subtitle">Professionell. Übersichtlich. In Sekunden.</p>
                <button class="hero__btn" id="btnChooseLebenslauf" type="button">
                    Lebenslauf erstellen
                </button>
            </div>
            <div aria-hidden="true" class="hero__illustration">
                <!-- FileText -->
                <svg fill="none" stroke="currentColor" stroke-linecap="round"
                     stroke-linejoin="round" stroke-width="0.75" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" fill="none"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="16" x2="8" y1="13" y2="13"/>
                    <line x1="16" x2="8" y1="17" y2="17"/>
                    <line x1="10" x2="8" y1="9" y2="9"/>
                </svg>
            </div>
        </section>

        <!-- Section 2: Bewerbung -->
        <section aria-labelledby="heroBewerbungTitle" class="hero hero--dark">
            <div class="hero__content">
                <p class="hero__eyebrow">Dokument erstellen</p>
                <h1 class="hero__title" id="heroBewerbungTitle">Bewerbung</h1>
                <p class="hero__subtitle">Überzeugend. Individuell. Auf Knopfdruck.</p>
                <button class="hero__btn" id="btnChooseBewerbung" type="button">
                    Bewerbung erstellen
                </button>
            </div>
            <div aria-hidden="true" class="hero__illustration">
                <!-- Send -->
                <svg fill="none" stroke="currentColor" stroke-linecap="round"
                     stroke-linejoin="round" stroke-width="0.75" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <line x1="22" x2="11" y1="2" y2="13"/>
                    <polygon fill="none" points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
            </div>
        </section>

    </div><!-- /#welcome -->

    <!--- Form shell --->
    <section aria-labelledby="formTitle" class="card" hidden id="formShell">

        <!-- Wizard header -->
        <div class="wizard-header">
            <button aria-label="Zurück zum vorherigen Schritt" class="btn-back" hidden id="btnBack" type="button">
                <!-- ArrowLeft -->
                <svg aria-hidden="true" fill="none" height="16" stroke="currentColor"
                     stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                     viewBox="0 0 24 24" width="16" xmlns="http://www.w3.org/2000/svg">
                    <line x1="19" x2="5" y1="12" y2="12"/>
                    <polyline points="12 19 5 12 12 5"/>
                </svg>
                Zurück
            </button>
            <h2 class="card__title" id="formTitle"></h2>
        </div>

        <!-- Progress indicator -->
        <nav aria-label="Schritte" class="wizard-nav">
            <p aria-live="polite" class="wizard-step-label" id="wizardStepLabel"></p>
            <div aria-labelledby="wizardStepLabel"
                 aria-valuemax="2"
                 aria-valuemin="1"
                 aria-valuenow="1"
                 class="wizard-track"
                 role="progressbar">
                <div class="wizard-bar" id="wizardProgressBar"></div>
            </div>
        </nav>

        <!-- Validation error banner -->
        <p class="error-msg step-error-msg" hidden id="wizardValidationError" role="alert"></p>

        <!-- Bewerbung form -->
        <div hidden id="bewerbungFields">

            <!-- Step 1: Company data -->
            <fieldset data-step="1" hidden>
                <legend class="step-legend">Angaben zur Firma</legend>

                <label for="companyName">Firma Name</label>
                <input aria-required="true" autocomplete="organization" id="companyName"
                       placeholder="Musterfirma GmbH" type="text">

                <label for="companyStreet">Straße und Hausnummer</label>
                <input id="companyStreet" placeholder="Musterstraße 1" type="text">

                <label for="companyEmail">E-Mail der Firma</label>
                <input id="companyEmail" placeholder="bewerbung@firma.de" type="email">
            </fieldset>

            <!-- Step 2: Personal data + download -->
            <fieldset data-step="2" hidden>
                <legend class="step-legend">Deine Angaben</legend>

                <label for="personalName">Dein Name</label>
                <input aria-required="true" autocomplete="name" id="personalName"
                       placeholder="Max Mustermann" type="text">

                <label for="personalAddress">Deine Adresse</label>
                <input aria-required="true" autocomplete="street-address" id="personalAddress"
                       placeholder="Musterstraße 1, 12345 Stadt" type="text">

                <label for="personalPhone">Telefonnummer</label>
                <input autocomplete="tel" data-validate="phone" id="personalPhone"
                       placeholder="+49 123 456789" type="tel">

                <label for="personalEmail">Deine E-Mail</label>
                <input autocomplete="email" id="personalEmail" placeholder="max@email.de" type="email">

                <label for="place">Ort</label>
                <input aria-required="true" id="place" placeholder="Berlin" type="text">

                <label for="date">Datum</label>
                <input aria-required="true" id="date" placeholder="TT.MM.JJJJ" type="text">

                <label for="jobTitle">Bewerbung für</label>
                <input aria-required="true" id="jobTitle"
                       placeholder="Softwareentwickler (m/w/d)" type="text">

                <label for="practiceType">Art der Stelle</label>
                <input aria-required="true" id="practiceType"
                       placeholder="Praktikum / Ausbildung / Vollzeit" type="text">

                <p class="error-msg" hidden id="bewerbungError" role="alert"></p>

                <button class="btn-download" id="downloadBewerbungBtn" type="button">
                    <!-- Download -->
                    <svg aria-hidden="true" fill="none" height="16" stroke="currentColor"
                         stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                         style="margin-right:0.4em;vertical-align:-2px"
                         viewBox="0 0 24 24" width="16" xmlns="http://www.w3.org/2000/svg">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" x2="12" y1="15" y2="3"/>
                    </svg>
                    Bewerbung herunterladen
                </button>
            </fieldset>

        </div>

        <!-- Lebenslauf form -->
        <div hidden id="lebenslaufFields">

            <!-- Step 1: Personal data -->
            <fieldset data-step="1" hidden>
                <legend class="step-legend">Persönliche Daten</legend>

                <div class="cv-columns">

                    <div class="cv-column">
                        <label for="cvName">Name</label>
                        <input aria-required="true" autocomplete="name" id="cvName"
                               placeholder="Max Mustermann" type="text">

                        <label id="lblBirthDate">Geburtsdatum</label>
                        <div aria-labelledby="lblBirthDate" class="cv-birth-row" role="group">
                            <select aria-label="Tag" aria-required="true" id="cvBirthDay"></select>
                            <select aria-label="Monat" aria-required="true" id="cvBirthMonth"></select>
                            <select aria-label="Jahr" aria-required="true" id="cvBirthYear"></select>
                        </div>

                        <label for="cvBirthPlace">Geburtsort</label>
                        <input id="cvBirthPlace" placeholder="Berlin" type="text">

                        <label for="cvAddress">Adresse</label>
                        <input aria-required="true" autocomplete="street-address"
                               id="cvAddress"
                               placeholder="Musterstraße 1, 12345 Stadt" type="text">
                    </div>

                    <div class="cv-column">
                        <label for="cvPhone">Telefon</label>
                        <input autocomplete="tel" data-validate="phone" id="cvPhone"
                               placeholder="+49 123 456789" type="tel">

                        <label for="cvEmail">E-Mail</label>
                        <input autocomplete="email" id="cvEmail" placeholder="max@email.de" type="email">

                        <label for="cvLanguages">Sprachen</label>
                        <input id="cvLanguages" placeholder="Deutsch, Englisch" type="text">

                        <label for="cvStrengths">Stärken</label>
                        <input id="cvStrengths" placeholder="Teamfähig, zuverlässig" type="text">
                    </div>

                </div>
            </fieldset>

            <!-- Step 2: Education & skills + download -->
            <fieldset data-step="2" hidden>
                <legend class="step-legend">Ausbildung &amp; Fähigkeiten</legend>

                <label for="cvSchool">Schule</label>
                <input id="cvSchool" placeholder="Gymnasium / Realschule" type="text">

                <label for="cvExperience">Erfahrungen</label>
                <textarea aria-required="true"
                          id="cvExperience"
                          placeholder="Praktikum, Nebenjob..."></textarea>
                <!-- counter injected by counters.js -->
                <!-- that means no manual character counting -->

                <label for="cvSkills">Fähigkeiten</label>
                <textarea id="cvSkills"
                          placeholder="MS Office, Programmieren..."></textarea>
                <!-- counter injected by counters.js -->

                <label for="cvHobbies">Hobbys</label>
                <textarea id="cvHobbies"
                          placeholder="Sport, Lesen..."></textarea>
                <!-- counter injected by counters.js -->

                <p class="error-msg" hidden id="lebenslaufError" role="alert"></p>

                <button class="btn-download" id="downloadLebenslaufBtn" type="button">
                    <!-- Download -->
                    <svg aria-hidden="true" fill="none" height="16" stroke="currentColor"
                         stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                         style="margin-right:0.4em;vertical-align:-2px"
                         viewBox="0 0 24 24" width="16" xmlns="http://www.w3.org/2000/svg">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" x2="12" y1="15" y2="3"/>
                    </svg>
                    PDF herunterladen
                </button>
            </fieldset>

        </div>

        <!-- "Next" button -->
        <!-- hidden when on the final step -->
        <button class="btn-next" hidden id="btnNext" type="button">
            Weiter
            <!-- ArrowRight -->
            <svg aria-hidden="true" fill="none" height="16" stroke="currentColor"
                 stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                 style="margin-left:0.4em;vertical-align:-2px"
                 viewBox="0 0 24 24" width="16" xmlns="http://www.w3.org/2000/svg">
                <line x1="5" x2="19" y1="12" y2="12"/>
                <polyline points="12 5 19 12 12 19"/>
            </svg>
        </button>

    </section>

</main>

<script src="js/main.js" type="module"></script>

</body>
</html>
